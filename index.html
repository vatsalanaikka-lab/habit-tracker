<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Habit Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --bg: #f7f8f6;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111412;
      --card: #1c1f1d;
      --text: #f0f0ee;
      --muted: #9ca3af;
      --border: #2a2d2b;
      --green-light: #0b2e22;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 52px 20px 24px;
  }
  header p { font-size: 13px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  header h1 { font-size: 22px; font-weight: 600; }
  .progress-bar-wrap {
    margin-top: 16px;
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #fff;
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label { margin-top: 6px; font-size: 12px; opacity: 0.85; }

  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .week-nav button {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
  }
  .week-nav button:active { background: var(--border); }
  .week-nav span { font-size: 14px; font-weight: 500; color: var(--text); }

  .day-strip {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1;
    min-width: 48px;
    text-align: center;
    padding: 10px 4px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .day-tab .day-name { font-size: 11px; color: var(--muted); }
  .day-tab .day-num { font-size: 17px; font-weight: 500; color: var(--muted); margin-top: 2px; }
  .day-tab.active .day-name { color: var(--green); }
  .day-tab.active .day-num { color: var(--green); }
  .day-tab.active { border-bottom-color: var(--green); }
  .day-tab .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin: 4px auto 0; opacity: 0; }
  .day-tab.has-ticks .dot { opacity: 1; }

  .habits-list { padding: 16px 16px 0; }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 20px 0 8px 4px;
  }
  .section-label:first-child { margin-top: 4px; }

  .habit-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .habit-card.done {
    border-color: var(--green);
    background: var(--green-light);
  }
  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .habit-card.done .check-circle {
    background: var(--green);
    border-color: var(--green);
  }
  .check-circle svg { display: none; }
  .habit-card.done .check-circle svg { display: block; }
  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .habit-time { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px;
    margin-top: 8px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .stat-card .value { font-size: 26px; font-weight: 600; color: var(--green); margin-top: 4px; }
  .stat-card .value span { font-size: 13px; font-weight: 400; color: var(--muted); }

  .reset-btn {
    display: block;
    margin: 4px 16px 0;
    width: calc(100% - 32px);
    padding: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    text-align: center;
  }
  .reset-btn:active { background: var(--border); }

  .weight-section {
    padding: 16px;
    margin-top: 8px;
  }
  .weight-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .weight-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 500;
  }
  .weight-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .weight-input-row input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
  }
  .weight-input-row input:focus { border-color: var(--green); }
  .weight-input-row button {
    padding: 12px 18px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .weight-input-row button:active { background: var(--green-dark); }
  .chart-wrap {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px 12px 12px;
    position: relative;
  }
  .chart-empty {
    text-align: center;
    padding: 32px 0;
    font-size: 13px;
    color: var(--muted);
  }
  .weight-latest {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 12px;
  }
  .weight-latest .val { font-size: 28px; font-weight: 600; color: var(--green); }
  .weight-latest .unit { font-size: 14px; color: var(--muted); }
  .weight-latest .change { font-size: 13px; margin-left: 4px; }
  .change.down { color: var(--green); }
  .change.up { color: #E24B4A; }
  canvas#weightChart { width: 100% !important; }
</style>
</head>
<body>

<header>
  <p id="week-label">Week of —</p>
  <h1>Habit Tracker</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <p class="progress-label" id="progress-label">0 of 28 done this week</p>
</header>

<div class="week-nav">
  <button onclick="changeWeek(-1)" aria-label="Previous week">&#8249;</button>
  <span id="week-range"></span>
  <button onclick="changeWeek(1)" aria-label="Next week">&#8250;</button>
</div>

<div class="day-strip" id="day-strip"></div>

<div class="habits-list" id="habits-list"></div>

<div class="summary-grid">
  <div class="stat-card">
    <div class="label">Today</div>
    <div class="value" id="today-val">0<span>/4</span></div>
  </div>
  <div class="stat-card">
    <div class="label">This week</div>
    <div class="value" id="week-val">0<span>%</span></div>
  </div>
</div>

<button class="reset-btn" onclick="resetWeek()">Reset this week</button>

<div class="weight-section">
  <div class="weight-header">
    <h2>Weight</h2>
  </div>
  <div id="weight-latest-wrap"></div>
  <div class="weight-input-row">
    <input type="number" id="weight-input" placeholder="Enter weight (kg)" step="0.1" min="20" max="300">
    <button onclick="logWeight()">Log</button>
  </div>
  <div class="chart-wrap">
    <div class="chart-empty" id="chart-empty">No weight entries yet. Log your first one above.</div>
    <canvas id="weightChart" height="180" style="display:none"></canvas>
  </div>
</div>

<script>
const HABITS = [
  { id: 'meal',  name: 'Meal pre-log',     time: '9:20am',  section: 'Nutrition' },
  { id: 'walk1', name: 'Walking session 1', time: '9:30am · 30 mins', section: 'Steps' },
  { id: 'walk2', name: 'Walking session 2', time: '12:00pm · 30 mins', section: 'Steps' },
  { id: 'walk3', name: 'Walking session 3', time: '4:00pm · 30 mins',  section: 'Steps' },
];

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let weekOffset = 0;
let selectedDay = 0;
let initialDaySet = false;

function getMonday(offset) {
  const today = new Date();
  const day = today.getDay();
  const diff = today.getDate() - day + (day === 0 ? -6 : 1) + offset * 7;
  const mon = new Date(today);
  mon.setDate(diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function weekKey(offset) {
  const d = getMonday(offset);
  return `week_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(weekKey(weekOffset))) || {}; }
  catch { return {}; }
}

function saveState(s) {
  try { localStorage.setItem(weekKey(weekOffset), JSON.stringify(s)); }
  catch {}
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function render() {
  const mon = getMonday(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('week-label').textContent = 'Week of ' + fmtDate(mon);
  document.getElementById('week-range').textContent = fmtDate(mon) + ' – ' + fmtDate(sun);

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayIdx = Math.floor((today - mon) / 86400000);

  if (!initialDaySet && weekOffset === 0 && todayIdx >= 0 && todayIdx <= 6) {
    selectedDay = todayIdx;
    initialDaySet = true;
  }

  const state = loadState();

  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const hasTicks = HABITS.some(h => state[h.id + '_' + i]);
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i === selectedDay ? ' active' : '') + (hasTicks ? ' has-ticks' : '');
    tab.innerHTML = `<div class="day-name">${DAY_NAMES[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="dot"></div>`;
    tab.onclick = () => { selectedDay = i; render(); };
    strip.appendChild(tab);
  }

  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  let lastSection = null;
  HABITS.forEach(h => {
    if (h.section !== lastSection) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = h.section;
      list.appendChild(lbl);
      lastSection = h.section;
    }
    const key = h.id + '_' + selectedDay;
    const done = !!state[key];
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="check-circle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>`;
    card.onclick = () => {
      const s = loadState();
      s[key] = !s[key];
      if (!s[key]) delete s[key];
      saveState(s);
      render();
    };
    list.appendChild(card);
  });

  const totalItems = 7 * HABITS.length;
  const totalDone = Object.keys(state).filter(k => state[k]).length;
  const todayDone = HABITS.filter(h => state[h.id + '_' + selectedDay]).length;
  const pct = Math.round(totalDone / totalItems * 100);

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = totalDone + ' of ' + totalItems + ' done this week';
  document.getElementById('today-val').innerHTML = todayDone + '<span>/' + HABITS.length + '</span>';
  document.getElementById('week-val').innerHTML = pct + '<span>%</span>';
}

function changeWeek(dir) {
  weekOffset += dir;
  selectedDay = 0;
  initialDaySet = true;
  render();
}

render();

const WEIGHT_KEY = 'weight_log_v1';
let weightChart = null;

function loadWeights() {
  try { return JSON.parse(localStorage.getItem(WEIGHT_KEY)) || []; }
  catch { return []; }
}

function saveWeights(arr) {
  try { localStorage.setItem(WEIGHT_KEY, JSON.stringify(arr)); }
  catch {}
}

function logWeight() {
  const input = document.getElementById('weight-input');
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 20 || val > 300) return;
  const entries = loadWeights();
  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  const existing = entries.findIndex(e => e.date === today);
  if (existing >= 0) entries[existing].weight = val;
  else entries.push({ date: today, weight: val });
  saveWeights(entries);
  input.value = '';
  renderWeightChart();
}

function renderWeightChart() {
  const entries = loadWeights();
  const empty = document.getElementById('chart-empty');
  const canvas = document.getElementById('weightChart');
  const latestWrap = document.getElementById('weight-latest-wrap');

  if (entries.length === 0) {
    empty.style.display = 'block';
    canvas.style.display = 'none';
    latestWrap.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  canvas.style.display = 'block';

  const latest = entries[entries.length - 1].weight;
  const prev = entries.length > 1 ? entries[entries.length - 2].weight : null;
  let changeHtml = '';
  if (prev !== null) {
    const diff = (latest - prev).toFixed(1);
    const cls = diff <= 0 ? 'down' : 'up';
    const arrow = diff <= 0 ? '▼' : '▲';
    changeHtml = `<span class="change ${cls}">${arrow} ${Math.abs(diff)} kg</span>`;
  }
  latestWrap.innerHTML = `<div class="weight-latest"><span class="val">${latest.toFixed(1)}</span><span class="unit">kg</span>${changeHtml}</div>`;

  const labels = entries.map(e => e.date);
  const data = entries.map(e => e.weight);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#9ca3af' : '#6b7280';

  if (weightChart) {
    weightChart.data.labels = labels;
    weightChart.data.datasets[0].data = data;
    weightChart.update();
    return;
  }

  weightChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#1D9E75',
        backgroundColor: 'rgba(29,158,117,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#1D9E75',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y.toFixed(1) + ' kg'
          }
        }
      },
      scales: {
        x: {
          ticks: { color: textColor, font: { size: 11 }, maxRotation: 0 },
          grid: { color: gridColor }
        },
        y: {
          ticks: { color: textColor, font: { size: 11 }, callback: v => v.toFixed(1) },
          grid: { color: gridColor }
        }
      }
    }
  });
}

renderWeightChart();

function resetWeek() {
  if (confirm('Reset all ticks for this week?')) {
    localStorage.removeItem(weekKey(weekOffset));
    render();
  }
}

render();
</script>
</body>
</html>
