<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Habit Tracker</title>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --bg: #f7f8f6;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111412;
      --card: #1c1f1d;
      --text: #f0f0ee;
      --muted: #9ca3af;
      --border: #2a2d2b;
      --green-light: #0b2e22;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 52px 20px 24px;
  }
  header p { font-size: 13px; opacity: 0.8; margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  header h1 { font-size: 22px; font-weight: 600; }
  .progress-bar-wrap {
    margin-top: 16px;
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #fff;
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label { margin-top: 6px; font-size: 12px; opacity: 0.85; }

  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .week-nav button {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
  }
  .week-nav button:active { background: var(--border); }
  .week-nav span { font-size: 14px; font-weight: 500; color: var(--text); }

  .day-strip {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 1;
    min-width: 48px;
    text-align: center;
    padding: 10px 4px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .day-tab .day-name { font-size: 11px; color: var(--muted); }
  .day-tab .day-num { font-size: 17px; font-weight: 500; color: var(--muted); margin-top: 2px; }
  .day-tab.active .day-name { color: var(--green); }
  .day-tab.active .day-num { color: var(--green); }
  .day-tab.active { border-bottom-color: var(--green); }
  .day-tab .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin: 4px auto 0; opacity: 0; }
  .day-tab.has-ticks .dot { opacity: 1; }

  .habits-list { padding: 16px 16px 0; }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 20px 0 8px 4px;
  }
  .section-label:first-child { margin-top: 4px; }

  .habit-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .habit-card.done {
    border-color: var(--green);
    background: var(--green-light);
  }
  .check-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .habit-card.done .check-circle {
    background: var(--green);
    border-color: var(--green);
  }
  .check-circle svg { display: none; }
  .habit-card.done .check-circle svg { display: block; }
  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .habit-time { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px;
    margin-top: 8px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .stat-card .value { font-size: 26px; font-weight: 600; color: var(--green); margin-top: 4px; }
  .stat-card .value span { font-size: 13px; font-weight: 400; color: var(--muted); }

  .reset-btn {
    display: block;
    margin: 4px 16px 0;
    width: calc(100% - 32px);
    padding: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    text-align: center;
  }
  .reset-btn:active { background: var(--border); }
</style>
</head>
<body>

<header>
  <p id="week-label">Week of —</p>
  <h1>Habit Tracker</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <p class="progress-label" id="progress-label">0 of 28 done this week</p>
</header>

<div class="week-nav">
  <button onclick="changeWeek(-1)" aria-label="Previous week">&#8249;</button>
  <span id="week-range"></span>
  <button onclick="changeWeek(1)" aria-label="Next week">&#8250;</button>
</div>

<div class="day-strip" id="day-strip"></div>

<div class="habits-list" id="habits-list"></div>

<div class="summary-grid">
  <div class="stat-card">
    <div class="label">Today</div>
    <div class="value" id="today-val">0<span>/4</span></div>
  </div>
  <div class="stat-card">
    <div class="label">This week</div>
    <div class="value" id="week-val">0<span>%</span></div>
  </div>
</div>

<button class="reset-btn" onclick="resetWeek()">Reset this week</button>

<script>
const HABITS = [
  { id: 'meal',  name: 'Meal pre-log',     time: '9:20am',  section: 'Nutrition' },
  { id: 'walk1', name: 'Walking session 1', time: '9:30am · 30 mins', section: 'Steps' },
  { id: 'walk2', name: 'Walking session 2', time: '12:00pm · 30 mins', section: 'Steps' },
  { id: 'walk3', name: 'Walking session 3', time: '4:00pm · 30 mins',  section: 'Steps' },
];

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let weekOffset = 0;
let selectedDay = 0;

function getMonday(offset) {
  const today = new Date();
  const day = today.getDay();
  const diff = today.getDate() - day + (day === 0 ? -6 : 1) + offset * 7;
  const mon = new Date(today);
  mon.setDate(diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function weekKey(offset) {
  const d = getMonday(offset);
  return `week_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(weekKey(weekOffset))) || {}; }
  catch { return {}; }
}

function saveState(s) {
  try { localStorage.setItem(weekKey(weekOffset), JSON.stringify(s)); }
  catch {}
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function render() {
  const mon = getMonday(weekOffset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('week-label').textContent = 'Week of ' + fmtDate(mon);
  document.getElementById('week-range').textContent = fmtDate(mon) + ' – ' + fmtDate(sun);

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayIdx = Math.floor((today - mon) / 86400000);

  if (weekOffset === 0 && todayIdx >= 0 && todayIdx <= 6 && selectedDay === 0) {
    selectedDay = todayIdx;
  }

  const state = loadState();

  const strip = document.getElementById('day-strip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const hasTicks = HABITS.some(h => state[h.id + '_' + i]);
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i === selectedDay ? ' active' : '') + (hasTicks ? ' has-ticks' : '');
    tab.innerHTML = `<div class="day-name">${DAY_NAMES[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="dot"></div>`;
    tab.onclick = () => { selectedDay = i; render(); };
    strip.appendChild(tab);
  }

  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  let lastSection = null;
  HABITS.forEach(h => {
    if (h.section !== lastSection) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = h.section;
      list.appendChild(lbl);
      lastSection = h.section;
    }
    const key = h.id + '_' + selectedDay;
    const done = !!state[key];
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="check-circle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-time">${h.time}</div>
      </div>`;
    card.onclick = () => {
      const s = loadState();
      s[key] = !s[key];
      if (!s[key]) delete s[key];
      saveState(s);
      render();
    };
    list.appendChild(card);
  });

  const totalItems = 7 * HABITS.length;
  const totalDone = Object.keys(state).filter(k => state[k]).length;
  const todayDone = HABITS.filter(h => state[h.id + '_' + selectedDay]).length;
  const pct = Math.round(totalDone / totalItems * 100);

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = totalDone + ' of ' + totalItems + ' done this week';
  document.getElementById('today-val').innerHTML = todayDone + '<span>/' + HABITS.length + '</span>';
  document.getElementById('week-val').innerHTML = pct + '<span>%</span>';
}

function changeWeek(dir) {
  weekOffset += dir;
  selectedDay = 0;
  render();
}

function resetWeek() {
  if (confirm('Reset all ticks for this week?')) {
    localStorage.removeItem(weekKey(weekOffset));
    render();
  }
}

render();
</script>
</body>
</html>
